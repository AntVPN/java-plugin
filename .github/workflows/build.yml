name: Build CI

on:
  push:
    branches: [ "main" ]
    tags:
      - '*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}"
          prerelease: "${{ github.ref_type != 'tag' }}"
          title: "${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}"
          files: |
            antivpn-multiplatform/target/AntiVPN*.jar
